name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Run preflight checks
        run: npm run preflight

      - name: Generate agent pressure harness artifact
        run: npm run agent-pressure-harness:ts -- --output artifacts/agent-pressure-harness.json

      - name: Upload agent pressure harness artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: agent-pressure-harness
          path: artifacts/agent-pressure-harness.json
          if-no-files-found: error
