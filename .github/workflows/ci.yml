name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run preflight checks
        run: python3 scripts/preflight.py
