name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run preflight checks
        run: python3 scripts/preflight.py

      - name: Generate agent pressure harness artifact
        run: python3 scripts/agent_pressure_harness.py --output artifacts/agent-pressure-harness.json

      - name: Upload agent pressure harness artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-pressure-harness
          path: artifacts/agent-pressure-harness.json
          if-no-files-found: error
